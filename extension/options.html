<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Sheltermark Settings</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 14px;
        color: #171717;
        background: #fff;
        padding: 32px;
        max-width: 480px;
      }
      h1 {
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 24px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      h1 img { width: 20px; height: 20px; }
      .field { margin-bottom: 16px; }
      label {
        display: block;
        font-size: 12px;
        font-weight: 500;
        color: #525252;
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      input[type="url"] {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid #e5e5e5;
        border-radius: 6px;
        font-size: 13px;
        font-family: "SF Mono", "Fira Mono", monospace;
        color: #171717;
        outline: none;
        transition: border-color 0.15s;
      }
      input[type="url"]:focus { border-color: #a3a3a3; }
      .hint {
        font-size: 12px;
        color: #737373;
        margin-top: 6px;
      }
      .actions {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-top: 20px;
      }
      button {
        padding: 7px 14px;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        border: none;
        transition: opacity 0.15s;
      }
      button:hover { opacity: 0.8; }
      #save-btn { background: #171717; color: #fff; }
      #reset-btn { background: #f5f5f5; color: #525252; }
      #status {
        font-size: 12px;
        color: #22c55e;
        opacity: 0;
        transition: opacity 0.2s;
      }
      #status.visible { opacity: 1; }
      #status.error { color: #ef4444; }
      @media (prefers-color-scheme: dark) {
        body { background: #0a0a0a; color: #fafafa; }
        input[type="url"] { background: #1a1a1a; border-color: #404040; color: #fafafa; }
        input[type="url"]:focus { border-color: #737373; }
        .hint { color: #737373; }
        label { color: #a3a3a3; }
        #save-btn { background: #fafafa; color: #0a0a0a; }
        #reset-btn { background: #262626; color: #a3a3a3; }
      }
    </style>
  </head>
  <body>
    <h1>
      <img src="icons/icon-48.png" alt="" />
      Sheltermark Settings
    </h1>
    <div class="field">
      <label for="base-url">Server URL</label>
      <input
        type="url"
        id="base-url"
        placeholder="https://sheltermark.vercel.app"
        spellcheck="false"
        autocomplete="off"
      />
      <p class="hint">Change this only if you are self-hosting or developing locally.</p>
    </div>
    <div class="actions">
      <button id="save-btn">Save</button>
      <button id="reset-btn">Reset to default</button>
      <span id="status"></span>
    </div>
    <script src="options.js" type="module"></script>
  </body>
</html>
